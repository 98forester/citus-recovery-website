# Netlify Configuration
# Auto-deploys from GitHub on push to main

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "GMAIL_USER,SUPABASE_URL,SITE_URL,OPENROUTER_MODEL"

# ── Serverless Function Redirects ─────────────────
# IMPORTANT: Must come BEFORE the SPA catch-all redirect
[[redirects]]
  from = "/api/launch-outreach"
  to = "/.netlify/functions/launch-outreach"
  status = 200

[[redirects]]
  from = "/api/check-claim"
  to = "/.netlify/functions/check-claim"
  status = 200

[[redirects]]
  from = "/api/notify-hot-lead"
  to = "/.netlify/functions/notify-hot-lead"
  status = 200

# SPA routing — redirect all paths to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security & Performance Headers ────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML (always serve fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Citus-Antigravity Edge Functions ──────────────
[[edge_functions]]
  path = "/api/qualify-lead"
  function = "qualify-lead"

[[edge_functions]]
  path = "/api/track-click"
  function = "track-click"

# ── Scheduled Functions ───────────────────────────
# Follow-up scheduler runs every 6 hours
[functions."follow-up-scheduler"]
  schedule = "0 */6 * * *"

# Environment variables required (set in Netlify Dashboard):
# SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# GMAIL_USER, GMAIL_APP_PASSWORD
# OPENROUTER_API_KEY, OPENROUTER_MODEL
# SITE_URL
