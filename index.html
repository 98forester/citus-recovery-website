  <!-- Structured Data: FAQPage (Google Rich Results) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What are surplus funds?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Surplus funds are the money left over when a foreclosed property is sold at auction for more than what was owed on the mortgage, taxes, or liens. That extra money belongs to you, the former owner. In Florida, this right is protected under Statute 45.032."
          }
        },
        {
          "@type": "Question",
          "name": "How do I know if I have surplus funds?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We conduct a thorough investigation across all 67 Florida county court records to determine if surplus funds exist in your name. This search is completely free and comes with zero obligation."
          }
        },
        {
          "@type": "Question",
          "name": "How much does it cost to hire Citus Recovery Solutions?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We work on a contingency fee basis — no upfront costs, no retainers, no out-of-pocket expenses. If we don't recover your funds, you don't owe us a cent."
          }
        },
        {
          "@type": "Question",
          "name": "How long does the process take?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The typical timeline is 30 to 60 days from the date your claim is filed. More complex cases involving competing liens, probate, or multiple claimants may take longer."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to come to Florida or appear in court?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. Our entire process is 100% virtual. You sign documents from your phone via e-Notary, and our attorneys attend all court hearings on your behalf. We serve clients throughout all 67 Florida counties."
          }
        },
        {
          "@type": "Question",
          "name": "Can I file the claim myself?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can try, but the legal process is complex. You must file a formal motion with the court, serve notice to all interested parties, and potentially attend hearings. One procedural error can delay or destroy your claim entirely."
          }
        },
        {
          "@type": "Question",
          "name": "What if another lienholder claims my surplus funds?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "This happens frequently. Banks, HOAs, and government agencies often file competing claims. Our legal team challenges illegitimate and inflated claims in court to maximize your recovery."
          }
        }
      ]
    }
    </script>
